<style>

<script>
const M=[
{id:1,t:"Welcome & Keypoints",st:"What to expect from your GLP-1 coaching journey",ic:"👋",sl:"slides/m1.jpg",ve:"https://www.youtube.com/embed/V8yBkTzYvJI",ss:[
  {t:"Welcome!",tp:"video",vp:"Welcome & Keypoints",ve:"https://www.youtube.com/embed/V8yBkTzYvJI",c:"Whether you're just starting your GLP-1 journey with medications like semaglutide or tirzepatide, or you're already a few weeks in, this coaching program is designed to support you every step of the way.\n\nThis isn't just about weight loss — it's about feeling better in your body, reclaiming your energy, building confidence, and working with your medication to understand how it affects your appetite, digestion, and metabolism."},

{id:2,t:"What GLP-1 Medications Do in the Body",st:"Understanding how your medication works",ic:"🧬",sl:"slides/m2.jpg",ve:"https://www.youtube.com/embed/SJcG6CCpcn4",ss:[
  {t:"How GLP-1 Medications Work",tp:"video",vp:"What GLP-1 Medications Do in the Body",ve:"https://www.youtube.com/embed/SJcG6CCpcn4",c:"GLP-1 medications (like semaglutide and tirzepatide) are designed to mimic a hormone your body naturally produces called glucagon-like peptide-1 (GLP-1). Understanding how this works can help you see why these medications are so effective — and why your body may feel different as it adjusts."},
  {t:"They Slow Gastric Emptying",tp:"text",c:"Your stomach empties more slowly than usual, meaning food stays in your stomach longer. This leads to:\n\n<strong>Feeling fuller sooner</strong> — you naturally eat less at each meal without forcing restriction.\n\n<strong>Staying satisfied between meals</strong> — the extended fullness helps reduce snacking and grazing.\n\n<strong>Naturally reducing overeating</strong> — your body sends clearer signals about when it's had enough.\n\n🔍 <strong>Why it matters:</strong> Slower digestion also helps regulate blood sugar because glucose is absorbed more gradually."},
  {t:"They Help Regulate Appetite",tp:"text",c:"GLP-1 acts on your brain's appetite centers to signal fullness and reduce cravings. This works with your body's natural systems, rather than forcing you to \"ignore hunger.\"\n\nYou may notice:\n\n<strong>You feel satisfied with smaller portions</strong> — this is the medication working as intended.\n\n<strong>Certain foods may seem less appealing</strong> — especially rich, fatty, or highly processed foods.\n\n<strong>Snacking out of boredom becomes easier to resist</strong> — because your brain is receiving clearer satiety signals."},
  {t:"They Support Blood Sugar Control",tp:"text",c:"GLP-1 medications stimulate insulin release when blood sugar rises, which is especially helpful for people with insulin resistance or type 2 diabetes. They also reduce the amount of glucose your liver releases into the blood.\n\n🔍 <strong>Why it matters:</strong> This combination supports more stable blood sugar levels, fewer spikes, and can improve energy throughout the day."},
  {t:"Your Body Needs Time to Adjust",tp:"text",c:"Because these medications change the way your stomach, gut, and brain respond to food, you may notice nausea or fullness early on, changes in appetite or cravings, and adjustments in energy or digestion.\n\n💡 <strong>Tip:</strong> These effects are normal and usually improve over time as your body adapts. Tracking your symptoms and habits can help you and your physician fine-tune your plan.\n\n<strong>Takeaway:</strong> GLP-1 medications are powerful tools for appetite control, digestion, and metabolic health. Understanding how they interact with your body helps you set realistic expectations, recognize normal side effects, and maximize the benefits over the long term."}
]},
{id:3,t:"Side Effects Are Normal — and Manageable",st:"What to expect and how to handle early symptoms",ic:"🩺",sl:"slides/m3.jpg",ve:"https://www.youtube.com/embed/Qw_n0sP4fzA",ss:[
  {t:"Early Side Effects: What's Normal",tp:"video",vp:"Side Effects Are Normal — and Manageable",ve:"https://www.youtube.com/embed/Qw_n0sP4fzA",c:"When starting a GLP-1 medication or increasing your dose, it's completely normal to notice some side effects in the first few weeks. Your body is adjusting to a new way of processing food, regulating appetite, and managing blood sugar."},
  {t:"Common Early Side Effects",tp:"text",c:"<strong>Nausea or upset stomach</strong> — feeling queasy, especially after meals. This is one of the most common early effects and typically improves within the first 2–4 weeks.\n\n<strong>Bloating or fullness</strong> — your stomach may feel heavier or more distended than usual as digestion slows.\n\n<strong>Constipation or diarrhea</strong> — changes in gut motility and digestion are common as your body recalibrates.\n\n<strong>Fatigue or low energy</strong> — your body is adapting to lower calorie intake and a shifting metabolism."},

{id:4,t:"How This Program Supports You",st:"What you'll receive each week",ic:"🤝",sl:"slides/m4.jpg",ve:"https://www.youtube.com/embed/xFl1EDYqoRI",ss:[

  {t:"Here's What You'll Receive",tp:"checklist",c:"☑ <strong>Clear, expert-backed guidance</strong> — Learn how to manage side effects, understand your body's responses, and feel confident with each step.\n\n☑ <strong>Coaching prompts</strong> — Reflect, track your habits, and uncover patterns that help you build long-lasting healthy routines.\n\n☑ <strong>Nutrition, movement, and mindset strategies</strong> — Tailored for GLP-1 users to support energy, digestion, appetite control, and overall wellbeing.\n\n☑ <strong>Tools</strong> — Access trackers, grocery lists, meal ideas, workouts, and more.\n\n☑ <strong>A supportive space to learn and grow</strong> — Build habits that stick, celebrate progress, and feel empowered."},

function rM(){
  var m=M.find(function(x){return x.id===CI});if(!m)return '';
  var s=m.ss[AS],d=CO.includes(m.id),av=m.ss.every(function(_,i){return SV.has(i)});
  var pv=M.find(function(x){return x.id===m.id-1}),nx=M.find(function(x){return x.id===m.id+1});
  var sb=m.ss.map(function(x,i){return '<button class="sec-btn '+(i===AS?'active':'')+'" onclick="gS('+i+')"><div class="sec-dot '+(SV.has(i)?'visited':'')+'">'+(SV.has(i)?'<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.3 4.3l-6 6a.5.5 0 01-.7 0l-3-3a.5.5 0 11.7-.7L7 9.3l5.6-5.6a.5.5 0 11.7.7z"/></svg>':(i+1))+'</div><span class="sec-name">'+x.t+'</span></button>'}).join('');
  var ct=d?'<div class="completed-tag"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.3 5.3l-4 4a.5.5 0 01-.7 0l-2-2a.5.5 0 11.7-.7L7 9.3l3.6-3.6a.5.5 0 11.7.7z"/></svg>Module complete</div>':'<button class="mark-btn '+(av?'ready':'locked')+'" '+(av?'onclick="mD()"':'disabled')+'>'+(av?'Mark Complete ✓':'Visit all sections ('+SV.size+'/'+m.ss.length+')')+'</button>';
  var cn=s.tp==='checklist'?'<ul style="list-style:none;padding:0">'+rc(s.c)+'</ul>':rc(s.c);
  var pl=m.ss.map(function(x,i){return '<button class="pill '+(i===AS?'active':'')+'" onclick="gS('+i+');window.scrollTo({top:0,behavior:\'smooth\'})">'+x.t+'</button>'}).join('');
  var ns=AS<m.ss.length-1?'<button onclick="gS('+(AS+1)+')">Next <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>':nx?'<button onclick="oM('+nx.id+')">Next Module <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>':'<button onclick="gH()">Back to Course</button>';

  return '<nav class="topnav"><div class="topnav-inner">'+
    '<button class="back-btn" onclick="gH()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12l-4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> All Modules</button>'+
    '<div class="topnav-brand"><span class="re">re</span><span style="font-weight:500">waken</span><span style="margin-left:4px">— GLP-1 Coaching</span></div>'+
    '<div class="nav-arrows"><button '+(pv?'onclick="oM('+pv.id+')"':'disabled')+'><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12l-4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button '+(nx?'onclick="oM('+nx.id+')"':'disabled')+'><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>'+
    '</div></nav>'+
    '<div class="mod-hdr"><div class="mod-hdr-inner"><span class="mnum">Module '+m.id+' of '+M.length+'</span><h1>'+m.t+'</h1><p class="msub">'+m.st+'</p></div></div>'+
    '<div class="mod-layout"><aside class="sidebar"><div class="sidebar-sticky"><h3>Sections</h3>'+sb+'<div class="sidebar-cta">'+ct+'</div></div></aside>'+
    '<main class="mod-main">'+
    '<div class="sec-hdr"><div class="sec-bar"></div><h2>'+s.t+'</h2></div>'+
    (s.tp==='video'?videoHTML(s):'')+
    '<div class="ccrd">'+cn+'</div>'+
    '<div class="sec-nav"><button '+(AS===0?'disabled':'')+' onclick="gS('+(AS-1)+')"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12l-4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Previous</button><span class="counter">'+(AS+1)+' / '+m.ss.length+'</span>'+ns+'</div>'+
    '<div class="mob-sections"><h3>All Sections</h3><div class="pill-wrap">'+pl+'</div></div>'+
    '</main></div>';
}

function R(){document.getElementById('app').innerHTML=V==='home'?rH():rM()}
function gH(){V='home';R();window.scrollTo(0,0)}
function oM(id){V='module';CI=id;AS=0;SV=new Set([0]);R();window.scrollTo(0,0)}
function gS(i){AS=i;SV.add(i);R()}
function mD(){if(!CO.includes(CI)){CO.push(CI);sp()}R()}
R();
</script>
